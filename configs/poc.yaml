rns:
  primes: [7, 11, 13, 17, 19, 23, 29, 31, 37]
  num_digit_slots: 6

arb:
  layer_positions: [29]  # after last layer = most direct gradient to LM head
  softmax_temperature: 1000.0
  num_results: 5
  dropout: 0.0  # no dropout for small PoC — maximize signal
  injector_init_std: 0.05  # large init so injection overrides base model biases
  gate_init_logit: 3.0  # sigmoid(3) ~ 0.95 — near-full injection from start
  extraction_mlp_hidden: 256
  extraction_num_classes: 10
  extraction_use_attention: true
  extraction_attn_rank: 32
  injection_pos_dim: 16  # per-answer-position embedding
  injection_mlp_hidden: 128  # MLP injection for nonlinear capacity

data:
  num_positive: 5000
  num_negative: 0
  num_edge_cases: 0
  max_digits: 3
  max_value: 499
  seed: 42
  output_dir: "data_poc/"
  pure_arithmetic: true

training:
  base_model: "HuggingFaceTB/SmolLM2-135M"
  lr: 5.0e-3
  weight_decay: 0.01
  batch_size: 64
  max_epochs: 30
  checkpoint_every_steps: 0
  max_seq_len: 48
  warmup_steps: 10
  grad_clip: 1.0
  log_every: 10
  eval_every: 100
  checkpoint_dir: "checkpoints_poc/"
  final_model_dir: "trained_model_poc/"
  auto_resume_latest: true
  device: "auto"
  answer_only_loss: true
  early_stopping_patience: 8
  max_eval_batches: 5
  eval_batch_size: 128
  phase1_epochs: 0
  phase2_epochs: 20
  phase3_epochs: 10
  aux_loss_weight: 1.0
  aux_loss_decay: 0.1
  phase1_aux_only: true
  curriculum_schedule: []

evaluation:
  num_samples_per_config: 50
  max_digits_range: [1, 3]
  max_new_tokens: 15
