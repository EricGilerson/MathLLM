rns:
  primes: [7, 11, 13, 17, 19, 23, 29, 31, 37]
  num_digit_slots: 6

arb:
  layer_positions: [4, 8, 10]
  softmax_temperature: 1000.0
  num_results: 5
  dropout: 0.1
  injector_init_std: 0.001
  extraction_mlp_hidden: 128
  extraction_num_classes: 10

data:
  num_positive: 500
  num_negative: 500
  num_edge_cases: 100
  max_digits: 5
  max_value: 100000
  seed: 42
  output_dir: "data_debug/"
  pure_arithmetic: true

training:
  base_model: "gpt2"
  lr: 3.0e-4
  weight_decay: 0.01
  batch_size: 16
  max_epochs: 10
  checkpoint_every_steps: 0
  max_seq_len: 32
  warmup_steps: 5
  grad_clip: 1.0
  log_every: 10
  eval_every: 100
  checkpoint_dir: "checkpoints_debug/"
  final_model_dir: "trained_model_debug/"
  auto_resume_latest: true
  device: "auto"
  answer_only_loss: false
  early_stopping_patience: 3
  max_eval_batches: 10
  phase1_epochs: 5
  phase2_epochs: 3
  phase3_epochs: 2
  aux_loss_weight: 1.0
  aux_loss_decay: 0.1
  phase1_aux_only: true
  curriculum_schedule: [[0.0, 3], [0.5, 5]]

evaluation:
  num_samples_per_config: 20
  max_digits_range: [1, 5]
  max_new_tokens: 15
