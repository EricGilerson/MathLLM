rns:
  primes: [7, 11, 13, 17, 19, 23, 29, 31, 37]
  num_digit_slots: 10

arb:
  layer_positions: [4, 8, 10]
  softmax_temperature: 1000.0
  num_results: 5  # add, sub, mul, exp, div
  dropout: 0.1  # dropout on extraction and injection layers

data:
  num_positive: 50000
  num_negative: 50000
  num_edge_cases: 10000
  max_digits: 10
  max_value: 1000000000  # 10^9
  seed: 42
  output_dir: "data/"

training:
  base_model: "gpt2"
  lr: 4.8e-3
  weight_decay: 0.01
  batch_size: 512
  max_epochs: 10
  checkpoint_every_steps: 0
  max_seq_len: 128
  warmup_steps: 100
  grad_clip: 1.0
  log_every: 50
  eval_every: 100
  checkpoint_dir: "checkpoints/"
  final_model_dir: "trained_model/"
  auto_resume_latest: true
  device: "auto"
  early_stopping_patience: 3  # stop if eval loss doesn't improve for N evals
  max_eval_batches: 20
  eval_batch_size: 1024

evaluation:
  num_samples_per_config: 200
  max_digits_range: [1, 10]
  max_new_tokens: 20
