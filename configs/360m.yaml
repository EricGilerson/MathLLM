rns:
  primes: [7, 11, 13, 17, 19, 23]
  num_digit_slots: 6  # handles up to 999,999 (covers 999*999=998,001)

arb:
  layer_positions: [20, 31]  # dual ARBs: mid-network + last layer
  softmax_temperature: 1000.0
  num_results: 5
  dropout: 0.0
  injector_init_std: 0.05
  gate_init_logit: 3.0
  extraction_mlp_hidden: 256
  extraction_num_classes: 10
  extraction_use_attention: true
  extraction_attn_rank: 32
  injection_pos_dim: 16
  injection_mlp_hidden: 128
  injection_attn_dim: 8
  injection_hard_select: true
  # LM head LoRA (increased rank for digit-to-token mapping)
  lora_rank: 32
  lora_alpha: 32.0

data:
  num_positive: 250000
  num_negative: 0
  num_edge_cases: 0
  max_digits: 3
  max_value: 999
  max_result: 999999
  seed: 42
  output_dir: "data_360m/"
  pure_arithmetic: true
  digit_weights: [1.5, 3, 6.5]  # 10% 1-digit, 20% 2-digit, 70% 3-digit

training:
  base_model: "HuggingFaceTB/SmolLM2-360M"
  lr: 5.0e-4
  weight_decay: 0.01
  batch_size: 512
  max_epochs: 200
  checkpoint_every_steps: 0
  max_seq_len: 32
  warmup_steps: 100
  grad_clip: 1.0
  log_every: 10
  eval_every: 0
  checkpoint_dir: "checkpoints_360m/"
  final_model_dir: "trained_model_360m/"
  auto_resume_latest: true
  device: "auto"
  answer_only_loss: true
  early_stopping_patience: 50
  max_eval_batches: 20
  eval_batch_size: 64
  phase1_epochs: 0
  phase2_epochs: 20
  phase3_epochs: 80
  aux_loss_weight: 1.0
  aux_loss_decay: 0.1
  phase1_aux_only: true
  curriculum_schedule: []

evaluation:
  num_samples_per_config: 200
  max_digits_range: [1, 3]
  max_new_tokens: 15
