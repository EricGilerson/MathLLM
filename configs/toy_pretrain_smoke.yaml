# Local end-to-end smoke test: approximately 1.04M parameters before ARB
# interface parameters. It is not rebuttal evidence.
model:
  n_layer: 4
  n_embd: 144
  n_head: 4
  n_inner: 576

data:
  mixture_file: "pretraining_data/toy_smoke.pt"
  tokenizer_file: "pretraining_data/toy_smoke_tokenizer.json"
  tokenizer_vocab_size: 512
  prose_documents: 256
  train_blocks: 256
  eval_blocks: 64
  arithmetic_token_fraction: 0.25
  max_digits: 2
  invocation_fraction: 0.25

training:
  output_dir: "pretraining_runs/toy_smoke"
  device: "auto"
  seed: 20260723
  context_length: 64
  batch_size: 4
  learning_rate: 0.0003
  weight_decay: 0.01
  max_steps: 3
  eval_batches: 2
  eval_cases: 4
