rns:
  primes: [7, 11, 13, 17, 19, 23, 29, 31, 37]
  num_digit_slots: 10

arb:
  layer_positions: [4, 8, 10]
  softmax_temperature: 1000.0
  num_results: 5  # add, sub, mul, exp, div
  dropout: 0.1  # dropout on extraction and injection layers
  injector_init_std: 0.001
  gate_init_logit: -2.0  # sigmoid(-2) ~ 0.12; learnable injection gate
  extraction_mlp_hidden: 128
  extraction_num_classes: 10

data:
  num_positive: 100000
  num_negative: 50000
  num_edge_cases: 10000
  max_digits: 10
  max_value: 1000000000  # 10^9
  seed: 42
  output_dir: "data/"

training:
  base_model: "gpt2"
  lr: 3.0e-4
  weight_decay: 0.01
  batch_size: 512
  max_epochs: 30
  checkpoint_every_steps: 0
  max_seq_len: 128
  warmup_steps: 10
  grad_clip: 1.0
  log_every: 50
  eval_every: 0  # disable mid-epoch eval; end-of-epoch eval is sufficient
  checkpoint_dir: "checkpoints/"
  final_model_dir: "trained_model/"
  auto_resume_latest: true
  device: "auto"
  answer_only_loss: false  # full next-token loss for richer gradients
  early_stopping_patience: 3  # stop if eval loss doesn't improve for N evals
  max_eval_batches: 5
  eval_batch_size: 512
  # Phased training
  phase1_epochs: 15  # extraction-only training (needs many epochs with filtered data)
  phase2_epochs: 8   # extraction + injection, aux loss active
  phase3_epochs: 7   # end-to-end, aux loss decayed
  aux_loss_weight: 1.0
  aux_loss_decay: 0.1
  phase1_aux_only: true
  curriculum_schedule: [[0.0, 3], [0.4, 6], [0.7, 10]]

evaluation:
  num_samples_per_config: 200
  max_digits_range: [1, 10]
  max_new_tokens: 20
