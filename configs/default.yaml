rns:
  primes: [7, 11, 13, 17, 19, 23, 29, 31, 37]
  num_digit_slots: 10

arb:
  layer_positions: [4, 8, 10]
  softmax_temperature: 1000.0
  num_results: 4  # add, sub, mul, exp

data:
  num_positive: 50000
  num_negative: 50000
  num_edge_cases: 10000
  max_digits: 10
  max_value: 1000000000  # 10^9
  seed: 42
  output_dir: "data/"

training:
  base_model: "gpt2"
  lr: 3.0e-4
  weight_decay: 0.01
  batch_size: 32
  max_epochs: 10
  max_seq_len: 128
  warmup_steps: 500
  grad_clip: 1.0
  log_every: 100
  eval_every: 1000
  checkpoint_dir: "checkpoints/"
  device: "auto"

evaluation:
  num_samples_per_config: 200
  max_digits_range: [1, 10]
  max_new_tokens: 20
